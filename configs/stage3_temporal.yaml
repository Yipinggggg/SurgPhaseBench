# =============================================================================
# Stage 3: temporal model training on precomputed frame features
# =============================================================================

seed: 42

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  feature_dir:  /projects/prjs1363/SurgPhaseBench/outputs/20260412_Stage1_ResNet50_RAMIE_split1/features         # directory of {video_id}.pt files
  split_dir:    /projects/prjs1363/SurgPhaseBench/outputs/20260412_Stage1_ResNet50_RAMIE_split1/features           # contains train.split1.bundle, ...
  split_name:   split1

  batch_size:   1       # typically 1 for full-video sequences
  num_workers:  4

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  name:        asformer_causal      # mstcn | asformer | matransformer | opera | sahc | actionformer | mamba | mamba_multistage | trans_svnet | tut
  feature_dim: 2048          # must match the feature extractor output dim (ResNet-GN is usually 2048, but check your encoder)
  num_classes: 13
  max_seq_len: 12000

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  name:         adamw
  lr:           7.0e-4
  weight_decay: 1.0e-4

# ---------------------------------------------------------------------------
# Scheduler  (set name: none to disable)
# ---------------------------------------------------------------------------
scheduler:
  name:         none

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  epochs:           150
  smoothing_weight: 0.25   # weight for TruncatedMSE smoothing (MS-TCN, ASFormer)
  grad_clip:        1.0    # 0 or null to disable
  early_stopping:
    enabled:        true
    monitor:        val/acc
    mode:           max
    patience:       20

# ---------------------------------------------------------------------------
# Logging & checkpointing
# ---------------------------------------------------------------------------
logging:
  wandb:
    enabled:  true
    project:  surgical-phase-recognition
    entity:   null          # your W&B username/team, or null
    name:     ramie_split1_resnet50_asformer_causal    # auto-generated if null
    tags:     []

  checkpoints:
    dirpath:    /projects/0/prjs1363/SurgPhaseBench/outputs/20260412_Stage3_ASFormer_Causal_ResNet50_RAMIE_split1/
    save_top_k: 2
    monitor:    val/acc
    mode:       max
    save_last:  true

evaluation:
  output_dir: /projects/0/prjs1363/SurgPhaseBench/outputs/20260412_Stage3_ASFormer_Causal_ResNet50_RAMIE_split1/test_results/
  predictions_dir: /projects/0/prjs1363/SurgPhaseBench/outputs/20260412_Stage3_ASFormer_Causal_ResNet50_RAMIE_split1/test_results/predictions/
  plot_predictions: true
  plots_dir: /projects/0/prjs1363/SurgPhaseBench/outputs/20260412_Stage3_ASFormer_Causal_ResNet50_RAMIE_split1/test_results/plots/

