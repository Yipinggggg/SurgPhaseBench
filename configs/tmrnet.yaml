# TMRNet Benchmarking Configuration (Hybrid Pipeline)
# 1. Prebuild Memory Bank with SV-RCNet (ResNet+LSTM)
# 2. Run TMRNet with trainable backbone and Prebuilt Context

mode: tmrnet
seed: 0

model:
  name: "tmrnet"         # TMRNet: Encoder + LSTM + Memory Bank + Relational Head
  backbone: "resnet50"   # Frame encoder
  hidden_size: 512       # LSTM hidden dimension
  lstm_layers: 1         # Number of LSTM layers
  bidirectional: false   # Unidirectional LSTM for streaming compatibility
  memory_dim: 512        # Features from prebuilt SV-RCNet memory bank
  memory_window: 30      # Historical context window in frames (5 sec @ 6fps)
  num_classes: 13
  dropout: 0.2           # Dropout in LSTM and relational head
  freeze: False
  pretrained_lstm_path: "/projects/prjs1363/SurgPhaseBench/outputs/20260413_End2End_ResNet50LSTM_split1_ramie/checkpoints/best_acc-epoch=033-val_acc=0.7178.ckpt"

data:
  dataset: RAMIE
  data_dir: "/projects/0/prjs1363/SurgPhaseBench/RAMIE_data" # Root for frames/labels
  memory_bank_dir: "/projects/prjs1363/SurgPhaseBench/outputs/20260413_End2End_ResNet50LSTM_split1_ramie/features"
  split: split1
  # Original script uses frame batches (400 train, 320 val) and reshapes by seq_len=10,
  # so effective sequence batches are 40 for train and 32 for val.
  train_batch_size: 40
  val_batch_size: 32
  test_batch_size: 32
  shuffle_train: true    # original script shuffles sequence start indices each epoch
  memory_window: 30      # Historical context window (frames of temporal history)
  seq_len: 10
  seq_stride: 1          # match dense sliding windows used in original TMRNet
  num_workers: 8
  img_size: 256
  no_data_aug: false


optimizer:
  name: adam
  lr: 1.0e-5
  weight_decay: 0.0
  multi_group: true
  backbone_lr_factor: 0.1

scheduler:
  name: plateau
  monitor: val/loss
  mode: min
  gamma: 0.1
  patience: 2

training:
  epochs: 100
  grad_clip: 1.0
  early_stopping:
    enabled: true
    monitor: val/acc
    mode: max
    patience: 15

logging:
  wandb:
    enabled: true
    project: surgical-phase-recognition-end2end
    entity: null
    name: 20260414_tmrnet_resnet50_ramie_split1
    tags: []

  checkpoints:
    dirpath: /projects/0/prjs1363/SurgPhaseBench/outputs/20260414_tmrnet_resnet50_ramie_split1/
    save_top_k: 2
    monitor: val/acc
    mode: max
    save_last: true

evaluation:
  output_dir: /projects/0/prjs1363/SurgPhaseBench/outputs/20260414_tmrnet_resnet50_ramie_split1/test_results/
  predictions_dir: /projects/0/prjs1363/SurgPhaseBench/outputs/20260414_tmrnet_resnet50_ramie_split1/test_results/predictions/
  plot_predictions: true
  plots_dir: /projects/0/prjs1363/SurgPhaseBench/outputs/20260414_tmrnet_resnet50_ramie_split1/test_results/plots/
